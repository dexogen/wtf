name: Publish Telegram Proxy Config

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "proxy-pages"
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch proxy files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          curl --fail --show-error --silent --location --retry 5 --retry-delay 2 \
            "https://core.telegram.org/getProxySecret" \
            -o dist/getProxySecret
          curl --fail --show-error --silent --location --retry 5 --retry-delay 2 \
            "https://core.telegram.org/getProxyConfig" \
            -o dist/getProxyConfig
          curl --fail --show-error --silent --location --retry 5 --retry-delay 2 \
            "https://core.telegram.org/getProxyConfigV6" \
            -o dist/getProxyConfigV6

          secret_size=$(wc -c < dist/getProxySecret)
          config_v4_size=$(wc -c < dist/getProxyConfig)
          config_v6_size=$(wc -c < dist/getProxyConfigV6)
          if [ "$secret_size" -lt 64 ] || [ "$config_v4_size" -lt 100 ] || [ "$config_v6_size" -lt 100 ]; then
            echo "Fetched files look too small: secret=$secret_size v4=$config_v4_size v6=$config_v6_size"
            exit 1
          fi

          fetched_at="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          sha256sum dist/getProxySecret dist/getProxyConfig dist/getProxyConfigV6 > dist/SHA256SUMS
          {
            echo "{"
            echo "  \"fetched_at\": \"${fetched_at}\","
            echo "  \"files\": ["
            echo "    \"getProxySecret\","
            echo "    \"getProxyConfig\","
            echo "    \"getProxyConfigV6\""
            echo "  ]"
            echo "}"
          } > dist/meta.json

      - name: Build index page
        shell: bash
        run: |
          set -euo pipefail
          cat > dist/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>Telegram MTProxy Config Mirror</title>
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 2rem; line-height: 1.5; }
              h1 { margin-bottom: 0.25rem; }
              ul { padding-left: 1.2rem; }
            </style>
          </head>
          <body>
            <h1>Telegram MTProxy Config Mirror</h1>
            <p>Auto-updated by GitHub Actions schedule.</p>
            <ul>
              <li><a href="./getProxySecret">getProxySecret</a></li>
              <li><a href="./getProxyConfig">getProxyConfig</a></li>
              <li><a href="./getProxyConfigV6">getProxyConfigV6</a></li>
              <li><a href="./SHA256SUMS">SHA256SUMS</a></li>
              <li><a href="./meta.json">meta.json</a></li>
            </ul>
          </body>
          </html>
          HTML
          touch dist/.nojekyll

      - name: Publish to gh-pages branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Build an orphan commit for gh-pages from dist/
          git checkout --orphan gh-pages-tmp
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a dist/. .
          rm -rf dist
          git add -A

          if git diff --cached --quiet; then
            echo "No changes to publish."
            exit 0
          fi

          git commit -m "Update proxy mirror $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git branch -M gh-pages
          git push --force origin gh-pages
